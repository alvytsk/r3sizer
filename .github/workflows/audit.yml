name: Security audit

on:
  schedule:
    - cron: "0 8 * * 1" # every Monday at 08:00 UTC
  push:
    paths:
      - "Cargo.lock"
  pull_request:
    paths:
      - "Cargo.lock"

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
