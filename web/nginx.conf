server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — send all unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable cache for hashed assets (JS, CSS, WASM, fonts)
    location ~* \.(js|css|wasm|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
